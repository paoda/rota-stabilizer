name: nightly

on:
  push:
    paths:
      - "**.zig"
      - "build.zig.zon"
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - uses: actions/checkout@v4

      - run: zig fmt --check src/**/*.zig build.zig build.zig.zon
  build-native:
    strategy:
      matrix:
        include:
          - os: macos-14
            cpu_flag: "-Dcpu=apple_m1"
          - os: windows-latest
            cpu_flag: "-Dcpu=x86_64_v3"
    runs-on: ${{matrix.os}}
    steps:
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v4

      - name: prepare-macos
        if: runner.os == 'macOS'
        run: brew install ffmpeg dylibbundler

      - name: build
        run: zig build -Doptimize=ReleaseSafe ${{ matrix.cpu_flag }}

      - name: bundle-dylibs
        if: runner.os == 'macOS'
        run: |
          dylibbundler -cd -b -x zig-out/bin/rota-stabilizer -d zig-out/bin/libs -p @executable_path/libs

      - name: package-macos-app
        if: runner.os == 'macOS'
        run: |
          mkdir -p zig-out/rota-stabilizer.app/Contents/MacOS

          cp zig-out/bin/rota-stabilizer zig-out/rota-stabilizer.app/Contents/MacOS/
          cp -R zig-out/bin/libs zig-out/rota-stabilizer.app/Contents/MacOS/

          cat > zig-out/rota-stabilizer.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>rota-stabilizer</string>
              <key>CFBundleIdentifier</key>
              <string>moe.paoda.rota-stabilizer</string>
              <key>CFBundleName</key>
              <string>rota-stabilizer</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
          </dict>
          </plist>
          EOF

          codesign --force --deep --sign - zig-out/rota-stabilizer.app
          ditto -c -k --sequesterRsrc --keepParent zig-out/rota-stabilizer.app zig-out/rota-stabilizer-macos-latest.zip

      - name: upload-macos
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: rota-stabilizer-macos-latest.zip
          path: zig-out/rota-stabilizer-macos-latest.zip
          archive: false

      - name: upload
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: rota-stabilizer-${{matrix.os}}.zip
          path: zig-out

  build-flatpak:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: rota-stabilizer.flatpak
          manifest-path: moe.paoda.rota-stabilizer.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: false

      - name: Upload Flatpak Artifact
        uses: actions/upload-artifact@v7
        with:
          name: rota-stabilizer.flatpak
          path: rota-stabilizer.flatpak
          archive: false
